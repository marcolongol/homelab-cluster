# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
clusterName: think-cluster

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.0.10.200:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.0.10.200"
  - "think-cluster.marcolongo.dev"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

imageFactory:
  registryURL: factory.talos.dev
  installerURLTmpl: "{{.RegistryURL}}/metal-installer/{{.ID}}:{{.Version}}"

nodes:
  - hostname: "thinkctr01"
    ipAddress: "10.0.10.10"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    controlPlane: true
    nodeLabels:
      openebs.io/engine: "mayastor"
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "6c:4b:90:70:dd:9b"
        dhcp: false
        addresses:
          - "10.0.10.10/23"
        routes:
          - network: "0.0.0.0/0"
            gateway: "10.0.10.1"
        mtu: 1500
        vip:
          ip: "10.0.10.200"

  - hostname: "thinkctr02"
    ipAddress: "10.0.10.20"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false

    controlPlane: true
    nodeLabels:
      openebs.io/engine: "mayastor"
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "6c:4b:90:c5:da:ed"
        dhcp: false
        addresses:
          - "10.0.10.20/23"
        routes:
          - network: "0.0.0.0/0"
            gateway: "10.0.10.1"
        mtu: 1500
        vip:
          ip: "10.0.10.200"

  - hostname: "thinkctr03"
    ipAddress: "10.0.10.30"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false

    controlPlane: true
    nodeLabels:
      openebs.io/engine: "mayastor"
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "6c:4b:90:cd:80:9a"
        dhcp: false
        addresses:
          - "10.0.10.30/23"
        routes:
          - network: "0.0.0.0/0"
            gateway: "10.0.10.1"
        mtu: 1500
        vip:
          ip: "10.0.10.200"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kernel.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  schematic:
    customization:
      extraKernelArgs:
        - amd_pstate=1
        - apparmor=0
        - security=none
        - init_on_alloc=1
        - init_on_free=1
        - mitigations=off
        - nvme_core.multipath=1
        - elevator=mq-deadline
        - quiet
        - loglevel=3
      systemExtensions:
        officialExtensions:
          - siderolabs/amd-ucode
          - siderolabs/amdgpu
          - siderolabs/binfmt-misc
          - siderolabs/btrfs
          - siderolabs/fuse3
          - siderolabs/glibc
          - siderolabs/iscsi-tools
          - siderolabs/nfsd
          - siderolabs/nvme-cli
          - siderolabs/util-linux-tools
          - siderolabs/zfs
  patches:
    - "@./patches/controller/admission-controller-patch.yaml"
    - "@./patches/controller/cluster.yaml"
