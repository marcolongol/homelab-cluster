theme: auto
log:
  level: debug
server:
  address: tcp://0.0.0.0:9091
  disable_healthcheck: true
  asset_path: /config/assets
telemetry:
  metrics:
    enabled: true
    address: tcp://0.0.0.0:8080
totp:
  disable: false
duo_api:
  disable: false
  enable_self_enrollment: true
webauthn:
  disable: false
  enable_passkey_login: true
authentication_backend:
  password_reset:
    disable: false
  refresh_interval: 1m
  ldap:
    implementation: custom
    address: ldap://ldap.${SECRET_DOMAIN}:389
    timeout: 5s
    start_tls: false
    additional_users_dn: cn=users
    users_filter: "(&(|({username_attribute}={input})(mail={input}))(objectClass=inetOrgPerson)(shadowExpire=-1)(mail=*))"
    additional_groups_dn: cn=groups
    groups_filter: "(member={dn})"
    group_search_mode: filter
    attributes:
      username: uid
      display_name: displayName
      mail: mail
      group_name: cn
      member_of: memberOf
regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 5m
session:
  name: authelia_session
  same_site: lax
  expiration: 1h
  inactivity: 15m
  remember_me: 1M
  cookies:
    - domain: ${SECRET_DOMAIN}
      authelia_url: https://auth.${SECRET_DOMAIN}
      default_redirection_url: https://${SECRET_DOMAIN}
notifier:
  disable_startup_check: true
  smtp:
    address: submission://mail.${SECRET_DOMAIN}:587
    username: admin@${SECRET_DOMAIN}
    sender: Authelia <admin@${SECRET_DOMAIN}>
access_control:
  default_policy: deny
  networks:
    - name: internal
      networks:
        - 10.0.0.0/8
  rules:
    - domain:
        - "auth.${SECRET_DOMAIN}"
        - "echo-server.${SECRET_DOMAIN}"
      policy: bypass
    - domain:
        - "homepage.${SECRET_DOMAIN}"
      policy: two_factor
    - domain:
        - "immich.${SECRET_DOMAIN}"
      policy: two_factor
      subject:
        - "group:immich_users"
    - domain:
        - "actual.${SECRET_DOMAIN}"
      policy: two_factor
      subject:
        - "group:actual_users"
    - domain:
        - "orcaslicer.${SECRET_DOMAIN}"
      policy: two_factor
      subject:
        - "group:orcaslicer_users"
    - domain:
        - "freecad.${SECRET_DOMAIN}"
      policy: two_factor
      subject:
        - "group:freecad_users"
    - domain:
        - "paperless.${SECRET_DOMAIN}"
      policy: bypass
      resources:
        - "^/share/.*$"
    - domain:
        - "paperless.${SECRET_DOMAIN}"
      policy: two_factor
      subject:
        - "group:paperless_users"
    - domain:
        - "prefect.${SECRET_DOMAIN}"
      policy: bypass
      resources:
        - "^/api/.*$"
    - domain:
        - "prefect.${SECRET_DOMAIN}"
      policy: two_factor
      subject:
        - "group:prefect_users"
    - domain:
        - "gitea.${SECRET_DOMAIN}"
      policy: bypass
      resources:
        - "^/[a-zA-Z0-9_.+-]+/[a-zA-Z0-9_.+-]+(\\.git)?/(info/refs|git-upload-pack|git-receive-pack).*$"
        - "^/api/.*$"
        - "^/user/oauth2/Authelia/callback$"
    - domain:
        - "gitea.${SECRET_DOMAIN}"
      policy: two_factor
      subject:
        - "group:gitea_users"
    - domain:
        - "vault.${SECRET_DOMAIN}"
      policy: bypass
      resources:
        - "^/api/.*$"
        - "^/identity/.*$"
        - "^/icons/.*$"
        - "^/notifications/hub.*$"
    - domain:
        - "vault.${SECRET_DOMAIN}"
      policy: two_factor
      subject:
        - "group:vaultwarden_users"
    - domain:
        - "synology.${SECRET_DOMAIN}"
      policy: bypass
      resources:
        - "^/sharing/.*$"
        - "^/webman/modules/FileBrowser/images/.*$"
        - "^/webman/3rdparty/.*$"
        - "^/webapi/entry.cgi.*[?&]_sharing_id=.*$"
    - domain:
        - "synology.${SECRET_DOMAIN}"
      policy: two_factor
    - domain: "*.${SECRET_DOMAIN}"
      policy: bypass
      methods:
        - OPTIONS
identity_providers:
  oidc:
    jwks:
      - algorithm: RS256
        # docker run --rm -u "$(id -u):$(id -g)" -v "$(pwd)":/keys authelia/authelia:latest authelia crypto pair rsa generate --directory /keys
        key: |-
          {{- env "OIDC_JWKS_KEY" | nindent 10 }}
    enable_client_debug_messages: true
    cors:
      endpoints: [authorization, token, revocation, introspection]
      allowed_origins_from_client_redirect_uris: true
    claims_policies:
      minio:
        id_token: [groups, email, preferred_username, name]
    clients:
      - client_name: Actual
        # docker run --rm authelia/authelia:latest authelia crypto rand --length 72 --charset rfc3986
        client_id: '{{ env "ACTUAL_OIDC_CLIENT_ID" }}'
        # docker run authelia/authelia:latest authelia crypto hash generate pbkdf2 --variant sha512 --random --random.length 72 --random.charset rfc3986
        client_secret: '{{ env "ACTUAL_OIDC_CLIENT_HASHED_SECRET" }}'
        public: false
        authorization_policy: two_factor
        pre_configured_consent_duration: 1y
        redirect_uris: ["https://actual.${SECRET_DOMAIN}/openid/callback"]
        scopes: [openid, profile, email, groups]
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic
      - client_name: Paperless
        # docker run --rm authelia/authelia:latest authelia crypto rand --length 72 --charset rfc3986
        client_id: '{{ env "PAPERLESS_OIDC_CLIENT_ID" }}'
        # docker run authelia/authelia:latest authelia crypto hash generate pbkdf2 --variant sha512 --random --random.length 72 --random.charset rfc3986
        client_secret: '{{ env "PAPERLESS_OIDC_CLIENT_HASHED_SECRET" }}'
        public: false
        authorization_policy: two_factor
        pre_configured_consent_duration: 1y
        redirect_uris:
          - "https://paperless.${SECRET_DOMAIN}/accounts/oidc/authelia/login/callback/"
        scopes: [openid, profile, email, groups]
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic
      - client_name: Gitea
        # docker run --rm authelia/authelia:latest authelia crypto rand --length 72 --charset rfc3986
        client_id: '{{ env "GITEA_OIDC_CLIENT_ID" }}'
        # docker run authelia/authelia:latest authelia crypto hash generate pbkdf2 --variant sha512 --random --random.length 72 --random.charset rfc3986
        client_secret: '{{ env "GITEA_OIDC_CLIENT_HASHED_SECRET" }}'
        public: false
        authorization_policy: two_factor
        pre_configured_consent_duration: 1y
        redirect_uris: ["https://gitea.${SECRET_DOMAIN}/user/oauth2/Authelia/callback"]
        scopes: [openid, profile, email, groups]
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic
      - client_name: Grafana
        client_id: '{{ env "GRAFANA_OIDC_CLIENT_ID" }}'
        client_secret: '{{ env "GRAFANA_OIDC_CLIENT_HASHED_SECRET" }}'
        public: false
        authorization_policy: two_factor
        pre_configured_consent_duration: 1y
        redirect_uris: ["https://grafana.${SECRET_DOMAIN}/login/generic_oauth"]
        scopes: [openid, profile, email, groups]
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic
      - client_name: MinIO
        # docker run --rm authelia/authelia:latest authelia crypto rand --length 72 --charset rfc3986
        client_id: '{{ env "MINIO_OIDC_CLIENT_ID" }}'
        # docker run authelia/authelia:latest authelia crypto hash generate pbkdf2 --variant sha512 --random --random.length 72 --random.charset rfc3986
        client_secret: '{{ env "MINIO_OIDC_CLIENT_HASHED_SECRET" }}'
        public: false
        authorization_policy: two_factor
        claims_policy: minio
        pre_configured_consent_duration: 1y
        redirect_uris: ["https://minio.${SECRET_DOMAIN}/oauth_callback"]
        scopes: [openid, profile, email, groups]
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic
      - client_name: Immich
        client_id: '{{ env "IMMICH_OIDC_CLIENT_ID" }}'
        client_secret: '{{ env "IMMICH_OIDC_CLIENT_HASHED_SECRET" }}'
        public: false
        authorization_policy: two_factor
        pre_configured_consent_duration: 1y
        redirect_uris:
          - "https://immich.${SECRET_DOMAIN}/auth/login"
          - "https://immich.${SECRET_DOMAIN}/user-settings"
          - "app.immich:///oauth-callback"
        scopes: [openid, profile, email]
        userinfo_signed_response_alg: RS256
        token_endpoint_auth_method: client_secret_post
      - client_name: Vaultwarden
        # docker run --rm authelia/authelia:latest authelia crypto rand --length 72 --charset rfc3986
        client_id: '{{ env "VAULTWARDEN_OIDC_CLIENT_ID" }}'
        # docker run authelia/authelia:latest authelia crypto hash generate pbkdf2 --variant sha512 --random --random.length 72 --random.charset rfc3986
        client_secret: '{{ env "VAULTWARDEN_OIDC_CLIENT_HASHED_SECRET" }}'
        public: false
        authorization_policy: two_factor
        pre_configured_consent_duration: 1y
        redirect_uris: ["https://vault.${SECRET_DOMAIN}/identity/connect/oidc-signin"]
        scopes: [openid, profile, email, groups]
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic
