---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      immich:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/reload: "true"
        pod:
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - machine-learning
                    topologyKey: kubernetes.io/hostname
        initContainers:
          init-media:
            image:
              repository: busybox
              tag: latest
            command: ["sh", "-c", "for dir in library thumbs upload encoded-video profile backups; do mkdir -p /data/$dir && touch /data/$dir/.immich; done"]
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.4
            envFrom:
              - secretRef:
                  name: immich-secret
            env:
              IMMICH_PORT: &port 2283
              IMMICH_CONFIG_FILE: /config/immich-config.json
              IMMICH_MEDIA_LOCATION: /data
              REDIS_HOSTNAME: immich-redis
              REDIS_PORT: "6379"
              IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
              TZ: America/Los_Angeles
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 8Gi

      machine-learning:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/reload: "true"
        pod:
          nodeSelector:
            feature.node.kubernetes.io/custom-amd-gpu: "true"
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.4
            env:
              IMMICH_PORT: &mlPort 3003
              MACHINE_LEARNING_CACHE_FOLDER: /cache
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
                amd.com/gpu: 1
              limits:
                amd.com/gpu: 1

      redis:
        replicas: 1
        strategy: RollingUpdate
        containers:
          redis:
            image:
              repository: docker.io/valkey/valkey
              tag: 9.1.0
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 256Mi

    service:
      app:
        controller: immich
        ports:
          http:
            port: *port
            primary: true
      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: *mlPort
      redis:
        controller: redis
        ports:
          redis:
            port: 6379

    ingress:
      app:
        className: internal
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Immich"
          gethomepage.dev/group: "Applications"
          gethomepage.dev/icon: "immich.png"
          gethomepage.dev/description: "Photo Management"
          gethomepage.dev/widget.type: "immich"
          gethomepage.dev/widget.url: "http://immich-app.default.svc.cluster.local:2283"
          gethomepage.dev/widget.key: '{{ "{{HOMEPAGE_VAR_IMMICH_API_KEY}}" }}'
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=immich"
          nginx.ingress.kubernetes.io/auth-url: "http://authelia.authelia.svc.cluster.local:9091/api/verify"
          nginx.ingress.kubernetes.io/auth-signin: "https://auth.${SECRET_DOMAIN}?rm=$request_method"
          nginx.ingress.kubernetes.io/auth-response-headers: "Remote-User,Remote-Name,Remote-Email,Remote-Groups"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
        hosts:
          - host: "immich.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
      api:
        className: internal
        annotations:
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
        hosts:
          - host: "immich.${SECRET_DOMAIN}"
            paths:
              - path: /api
                service:
                  identifier: app
                  port: http
              - path: /socket.io
                service:
                  identifier: app
                  port: http

    persistence:
      data:
        enabled: true
        existingClaim: *app
        type: persistentVolumeClaim
        advancedMounts:
          immich:
            init-media:
              - path: /data
            app:
              - path: /data
      upload:
        enabled: true
        type: nfs
        server: ${CONFIG_NAS_IP_ADDRESS}
        path: "${CONFIG_NAS_DEFAULT_SHARE}/Apps/Immich"
        advancedMounts:
          immich:
            init-media:
              - path: /data/upload
            app:
              - path: /data/upload
      config:
        enabled: true
        type: secret
        name: immich-secret
        advancedMounts:
          immich:
            app:
              - path: /config/immich-config.json
                subPath: immich-config.json
                readOnly: true
      ml-cache:
        enabled: true
        type: emptyDir
        advancedMounts:
          machine-learning:
            app:
              - path: /cache
