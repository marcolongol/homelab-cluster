---
# yaml-language-server: $schema=https://raw.githubusercontent.com/marcolongol/CRDs-catalog/refs/heads/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-secret
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: gitea-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Gitea DB connection
        GITEA_DB_USER: "{{ .POSTGRES_USER }}"
        GITEA_DB_PASS: "{{ .POSTGRES_PASSWORD }}"
        # Gitea app secrets
        GITEA_ADMIN_USERNAME: "{{ .ADMIN_USERNAME }}"
        GITEA_ADMIN_PASSWORD: "{{ .ADMIN_PASSWORD }}"
        GITEA_SECRET_KEY: "{{ .SECRET_KEY }}"
  dataFrom:
    - extract:
        key: GITEA
