---
# yaml-language-server: $schema=https://raw.githubusercontent.com/marcolongol/CRDs-catalog/refs/heads/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-secret
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: gitea-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Gitea DB connection
        GITEA_DB_HOST: &dbHost cloudnative-pg-rw.cloudnative-pg.svc.cluster.local
        GITEA_DB_NAME: &dbName gitea
        GITEA_DB_USER: &dbUser "{{ .POSTGRES_USER }}"
        GITEA_DB_PASS: &dbPass "{{ .POSTGRES_PASSWORD }}"
        # Postgres init container
        INIT_POSTGRES_DBNAME: *dbName
        INIT_POSTGRES_HOST: *dbHost
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASSWORD }}"
        INIT_POSTGRES_USER: *dbUser
        # Gitea app secrets
        GITEA_ADMIN_USERNAME: "{{ .ADMIN_USERNAME }}"
        GITEA_ADMIN_PASSWORD: "{{ .ADMIN_PASSWORD }}"
        GITEA_SECRET_KEY: "{{ .SECRET_KEY }}"
  data:
    - secretKey: POSTGRES_SUPER_PASSWORD
      remoteRef:
        key: CLOUDNATIVE_PG
        property: POSTGRES_PASSWORD
  dataFrom:
    - extract:
        key: GITEA
