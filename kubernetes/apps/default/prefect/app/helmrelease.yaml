---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app prefect
spec:
  interval: 1h
  chart:
    spec:
      chart: prefect-server
      version: 2026.3.19205444
      sourceRef:
        kind: HelmRepository
        name: prefect
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: prefect-secret
      valuesKey: PREFECT_DB_USER
      targetPath: secret.username
    - kind: Secret
      name: prefect-secret
      valuesKey: PREFECT_DB_PASS
      targetPath: secret.password
    - kind: Secret
      name: prefect-secret
      valuesKey: PREFECT_DB_HOST
      targetPath: secret.host
    - kind: Secret
      name: prefect-secret
      valuesKey: PREFECT_DB_NAME
      targetPath: secret.database
  values:
    secret:
      create: true
      port: "5432"
    postgresql:
      enabled: false
    server:
      debug: false
      loggingLevel: WARNING
      uiConfig:
        prefectUiApiUrl: "https://prefect.${SECRET_DOMAIN}/api"
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    ingress:
      enabled: true
      className: internal
      annotations:
        nginx.ingress.kubernetes.io/auth-url: "http://authelia.authelia.svc.cluster.local:9091/api/verify"
        nginx.ingress.kubernetes.io/auth-signin: "https://auth.${SECRET_DOMAIN}?rm=$request_method"
        nginx.ingress.kubernetes.io/auth-response-headers: "Remote-User,Remote-Name,Remote-Email,Remote-Groups"
      host:
        hostname: "prefect.${SECRET_DOMAIN}"
        path: /
        pathType: Prefix
    service:
      type: ClusterIP
      port: 4200