---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: usjobs-staging
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: usjobs
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: POSTGRES_USER
      targetPath: usjobs-api.externalDatabase.user
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: POSTGRES_PASSWORD
      targetPath: usjobs-api.externalDatabase.password
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: POSTGRES_PORT
      targetPath: usjobs-api.externalDatabase.port
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: POSTGRES_USER
      targetPath: usjobs-etl.externalDatabase.user
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: POSTGRES_PASSWORD
      targetPath: usjobs-etl.externalDatabase.password
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: POSTGRES_PORT
      targetPath: usjobs-etl.externalDatabase.port
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: DEEPL_API_KEY
      targetPath: usjobs-api.deepl.apiKey
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: GEOIP_ACCOUNT_ID
      targetPath: usjobs-app.geoip.accountId
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: GEOIP_LICENSE_KEY
      targetPath: usjobs-app.geoip.licenseKey
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: OAUTH_GOOGLE_CLIENT_ID
      targetPath: usjobs-api.google.clientId
    - kind: Secret
      name: usjobs-staging-secrets
      valuesKey: OAUTH_GOOGLE_CLIENT_SECRET
      targetPath: usjobs-api.google.clientSecret
  values:
    global:
      imagePullSecrets:
        - name: ghcr-auth

    usjobs-app:
      geoip:
        enabled: true
      ingress:
        enabled: true
        className: h2way-external
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.${H2WAY_DOMAIN}"
        hosts:
          - host: "staging.${H2WAY_DOMAIN}"
            paths:
              - path: /
                pathType: ImplementationSpecific

    usjobs-api:
      frontendURL: "https://staging.${H2WAY_DOMAIN}"
      google:
        callbackURL: "https://staging.${H2WAY_DOMAIN}/api/auth/google/callback"
      postgresql:
        enabled: false
      externalDatabase:
        host: cloudnative-pg-staging-rw-lb.cloudnative-pg.svc.cluster.local
        database: usjobs
      auth:
        jwt:
          existingSecret: usjobs-staging-secrets
          existingSecretKey: JWT_SECRET

    usjobs-etl:
      postgresql:
        enabled: false
      externalDatabase:
        host: cloudnative-pg-staging-rw-lb.cloudnative-pg.svc.cluster.local
        database: usjobs
      env:
        - name: PREFECT_API_URL
          value: "http://prefect-server.default.svc.cluster.local:4200/api"
      prefectServer:
        enabled: false
