# yaml-language-server: $schema=https://raw.githubusercontent.com/marcolongol/CRDs-catalog/refs/heads/main/postgresql.cnpg.io/cluster_v1.json
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cloudnative-pg-immich
spec:
  instances: 1

  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.9-0.3.0
  bootstrap:
    initdb:
      postInitTemplateSQL:
        - CREATE EXTENSION vchord CASCADE;
        - CREATE EXTENSION earthdistance CASCADE;

  storage:
    size: 10Gi
    storageClass: openebs-hostpath

  enableSuperuserAccess: true

  superuserSecret:
    name: cloudnative-pg-secret

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: 128MB
    shared_preload_libraries:
      - "vchord.so"

  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
