# yaml-language-server: $schema=https://raw.githubusercontent.com/marcolongol/CRDs-catalog/refs/heads/main/postgresql.cnpg.io/cluster_v1.json
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cloudnative-pg-staging
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgis:17-3.4
  bootstrap:
    initdb:
      postInitTemplateSQL:
        - CREATE EXTENSION postgis;
        - CREATE EXTENSION postgis_topology;
        - CREATE EXTENSION fuzzystrmatch;
        - CREATE EXTENSION postgis_tiger_geocoder;

  storage:
    size: 10Gi
    storageClass: openebs-hostpath

  enableSuperuserAccess: true

  superuserSecret:
    name: cloudnative-pg-secret

  monitoring:
    enablePodMonitor: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: 128MB

  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: cloudnative-pg-staging-rw-lb
              labels:
                cnpg.io/cluster: cloudnative-pg-staging
              annotations:
                lbipam.cilium.io/ips: "10.0.11.209"
                coredns.io/hostname: "postgres-staging.${SECRET_DOMAIN}"
            spec:
              type: LoadBalancer
