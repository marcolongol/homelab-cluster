---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea-runner
spec:
  interval: 1h
  chart:
    spec:
      chart: actions
      version: ">=0.1.0 <0.2.0"
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    enabled: true
    giteaRootURL: "http://gitea-http.default.svc.cluster.local:3000"
    existingSecret: gitea-runner-secret
    existingSecretKey: RUNNER_TOKEN
    statefulset:
      actRunner:
        registry: docker.io
        repository: gitea/act_runner
        tag: "0.6.1"
      replicas: 1
      persistence:
        size: 1Gi
      dind:
        rootless: false
        registry: docker.io
        repository: docker
        tag: "27.5.1-dind"
