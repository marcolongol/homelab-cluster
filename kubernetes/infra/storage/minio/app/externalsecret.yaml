---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: minio-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        rootUser: "{{ .MINIO_ROOT_USER }}"
        rootPassword: "{{ .MINIO_ROOT_PASSWORD }}"
        MINIO_OIDC_CLIENT_ID: "{{ .MINIO_OIDC_CLIENT_ID }}"
        MINIO_OIDC_CLIENT_SECRET: "{{ .MINIO_OIDC_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: MINIO
    - extract:
        key: AUTHELIA
